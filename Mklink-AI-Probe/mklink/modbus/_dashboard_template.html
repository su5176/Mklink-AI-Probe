<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKLink Modbus Dashboard</title>
<link rel="stylesheet" href="/static/modbus_dashboard.css">
</head>
<body>
<header>
  <h1 id="page-title">MKLink Modbus 仪表盘</h1>
  <span id="conn-status" class="badge badge-ok" data-i18n="mb_online">在线</span>
  <span id="poll-count" class="badge badge-info">0 次</span>
  <div class="spacer"></div>
  <button id="lang-btn" class="btn">中/En</button>
  <button id="pause-btn" class="btn" data-i18n="mb_pause">暂停</button>
</header>
<div class="tabs">
  <div class="tab active" data-tab="overview" data-i18n="mb_overview">总览</div>
  <div class="tab" data-tab="charts" data-i18n="mb_charts">图表</div>
  <div class="tab" data-tab="parameters" data-i18n="mb_parameters">参数</div>
  <div class="tab" data-tab="alarms" data-i18n="mb_alarms">报警</div>
  <div class="tab" data-tab="debug" data-i18n="mb_debug">调试</div>
</div>
<div id="tab-overview" class="tab-content active">
  <div class="status-bar" id="status-bar"></div>
  <div class="control-panel" id="control-panel"></div>
  <div id="alarm-banner" class="alarm-banner"></div>
  <div class="overview-grid" id="metrics-grid"></div>
</div>
<div id="tab-charts" class="tab-content">
  <div id="chart-container">
    <div id="var-selector"></div>
    <div id="chart-wrap"><canvas id="chart"></canvas><div id="tooltip"></div></div>
  </div>
</div>
<div id="tab-parameters" class="tab-content">
  <div class="params-bar">
    <input type="text" id="param-search" data-i18n-placeholder="mb_search_params" placeholder="搜索参数..." />
  </div>
  <div id="params-content"></div>
</div>
<div id="tab-alarms" class="tab-content">
  <div class="alarm-grid" id="alarm-grid"></div>
  <div class="alarm-history"><h3 data-i18n="mb_alarm_history">报警历史</h3><div id="alarm-history-list"></div></div>
</div>
<div id="tab-debug" class="tab-content">
  <div class="debug-layout">
    <div>
      <div class="debug-panel">
        <h3 data-i18n="mb_manual_read">Manual Read</h3>
        <div class="debug-grid">
          <label>FC<select id="dbg-read-fc"><option value="1">01 Coils</option><option value="2">02 Inputs</option><option value="3" selected>03 Holding</option><option value="4">04 Input Reg</option></select></label>
          <label>Start<input id="dbg-read-start" type="number" value="0"></label>
          <label>Quantity<input id="dbg-read-qty" type="number" value="1" min="1" max="125"></label>
        </div>
        <div class="debug-actions"><button class="btn" id="dbg-read-btn" data-i18n="mb_read">Read</button></div>
      </div>
      <div class="debug-panel" style="margin-top:12px">
        <h3 data-i18n="mb_manual_write">Manual Write</h3>
        <div class="debug-grid">
          <label>FC<select id="dbg-write-fc"><option value="5">05 Coil</option><option value="6" selected>06 Register</option><option value="15">15 Coils</option><option value="16">16 Registers</option></select></label>
          <label>Start<input id="dbg-write-start" type="number" value="200"></label>
          <label style="grid-column:1/-1">Values<input id="dbg-write-values" type="text" value="0"></label>
        </div>
        <div class="debug-actions"><button class="btn" id="dbg-write-btn" data-i18n="mb_write">Write</button></div>
      </div>
      <div class="debug-panel" style="margin-top:12px">
        <h3 data-i18n="mb_command">Command</h3>
        <div class="debug-grid">
          <label style="grid-column:1/-1">Action<select id="dbg-command"></select></label>
          <label style="grid-column:1/-1">Params<input id="dbg-command-params" type="text" placeholder="name=value, ..."></label>
        </div>
        <div class="debug-actions"><button class="btn" id="dbg-command-btn" data-i18n="mb_send">Send</button></div>
      </div>
    </div>
    <div class="debug-log" id="debug-log"></div>
  </div>
</div>
<footer id="footer-bar"></footer>
<div id="shutdown-overlay">
  <h2 data-i18n="mb_server_shutdown">服务器已关闭</h2>
  <p data-i18n="mb_server_stopped_msg">Modbus 仪表盘服务已停止。</p>
  <p data-i18n="mb_close_tab_msg">您可以关闭此页面。</p>
</div>
<script>
var CONFIG = {
  profile: __PROFILE_JSON__,
  csrf: "__CSRF_TOKEN__",
  maxPoints: __MAX_POINTS__,
  lang: "__LANG__"
};
</script>
<script src="/static/modbus_dashboard.js"></script>
</body>
</html>
