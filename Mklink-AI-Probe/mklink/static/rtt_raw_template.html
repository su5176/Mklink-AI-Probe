<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MKLink RTT Raw Terminal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }
.toolbar { background: #2d2d2d; padding: 6px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #404040; flex-shrink: 0; }
.toolbar .title { font-weight: bold; color: #569cd6; font-size: 14px; }
.toolbar .badge { background: #4ec9b0; color: #1e1e1e; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
.toolbar input { background: #3c3c3c; border: 1px solid #555; color: #d4d4d4; padding: 4px 8px; border-radius: 3px; font-size: 12px; width: 200px; }
.toolbar button { background: #3c3c3c; border: 1px solid #555; color: #d4d4d4; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
.toolbar button:hover { background: #4c4c4c; }
.toolbar button.active { background: #264f78; border-color: #569cd6; }
.toolbar .stats { margin-left: auto; color: #808080; font-size: 11px; }
.terminal { flex: 1; overflow-y: auto; padding: 8px 12px; white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; }
.terminal .line { display: block; }
.terminal .line:hover { background: #2a2d2e; }
.terminal .lineno { color: #858585; display: inline-block; width: 50px; text-align: right; margin-right: 12px; user-select: none; }
.terminal .highlight { background: #613214; color: #fff; }
.status-bar { background: #007acc; color: #fff; padding: 2px 12px; font-size: 11px; display: flex; justify-content: space-between; flex-shrink: 0; }
.paused .status-bar { background: #c53030; }
</style>
</head>
<body>
<div class="toolbar">
  <span class="title">MKLink RTT</span>
  <span class="badge">RAW</span>
  <input type="text" id="filter" placeholder="搜索过滤 (Enter 确认)..." />
  <button id="btn-pause">暂停</button>
  <button id="btn-scroll" class="active">自动滚动</button>
  <button id="btn-clear">清屏</button>
  <button id="btn-copy">复制全部</button>
  <span class="stats">行数: <span id="line-count">0</span> | 连接: <span id="conn-status">...</span></span>
</div>
<div class="terminal" id="terminal"></div>
<div class="status-bar">
  <span id="status-left">RTT Raw Terminal</span>
  <span id="status-right">等待连接...</span>
</div>
<script>
(function() {
  var terminal = document.getElementById('terminal');
  var lineCountEl = document.getElementById('line-count');
  var connStatus = document.getElementById('conn-status');
  var statusRight = document.getElementById('status-right');
  var filterInput = document.getElementById('filter');
  var btnPause = document.getElementById('btn-pause');
  var btnScroll = document.getElementById('btn-scroll');
  var btnClear = document.getElementById('btn-clear');
  var btnCopy = document.getElementById('btn-copy');

  var lineCount = 0;
  var paused = false;
  var autoScroll = true;
  var filterText = '';
  var allLines = [];
  var MAX_LINES = __MAX_LINES__;

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlightMatch(text, query) {
    if (!query) return escapeHtml(text);
    var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('(' + escaped + ')', 'gi');
    return escapeHtml(text).replace(re, '<span class="highlight">$1</span>');
  }

  function renderLine(text, num) {
    if (filterText && text.toLowerCase().indexOf(filterText.toLowerCase()) === -1) return '';
    var content = highlightMatch(text, filterText);
    return '<span class="line"><span class="lineno">' + num + '</span>' + content + '</span>\n';
  }

  function appendLine(text) {
    lineCount++;
    allLines.push(text);
    if (allLines.length > MAX_LINES) allLines.shift();
    if (!paused) {
      var html = renderLine(text, lineCount);
      if (html) {
        terminal.insertAdjacentHTML('beforeend', html);
        if (terminal.children.length > MAX_LINES) terminal.removeChild(terminal.firstChild);
      }
      if (autoScroll) terminal.scrollTop = terminal.scrollHeight;
    }
    lineCountEl.textContent = lineCount;
  }

  function rerender() {
    terminal.innerHTML = '';
    var start = Math.max(0, allLines.length - MAX_LINES);
    for (var i = start; i < allLines.length; i++) {
      var html = renderLine(allLines[i], lineCount - allLines.length + i + 1);
      if (html) terminal.insertAdjacentHTML('beforeend', html);
    }
    if (autoScroll) terminal.scrollTop = terminal.scrollHeight;
  }

  // SSE connection
  var evtSource = new EventSource('/stream');
  evtSource.onopen = function() { connStatus.textContent = '已连接'; statusRight.textContent = '接收中...'; };
  evtSource.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'text') appendLine(msg.data);
    } catch(err) { appendLine(e.data); }
  };
  evtSource.onerror = function() { connStatus.textContent = '断开'; statusRight.textContent = '连接断开'; };

  // Controls
  btnPause.addEventListener('click', function() {
    paused = !paused;
    btnPause.textContent = paused ? '恢复' : '暂停';
    document.body.classList.toggle('paused', paused);
    if (!paused) rerender();
  });
  btnScroll.addEventListener('click', function() {
    autoScroll = !autoScroll;
    btnScroll.classList.toggle('active', autoScroll);
    if (autoScroll) terminal.scrollTop = terminal.scrollHeight;
  });
  btnClear.addEventListener('click', function() {
    allLines = []; lineCount = 0; terminal.innerHTML = '';
    lineCountEl.textContent = '0';
  });
  btnCopy.addEventListener('click', function() {
    var text = allLines.join('\n');
    navigator.clipboard.writeText(text).then(function() { btnCopy.textContent = '已复制'; setTimeout(function(){ btnCopy.textContent = '复制全部'; }, 1500); });
  });
  filterInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { filterText = filterInput.value; rerender(); }
  });
  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.target === filterInput) return;
    if (e.code === 'Space') { e.preventDefault(); btnPause.click(); }
    if (e.key === 'f' || e.key === 'F') { e.preventDefault(); filterInput.focus(); }
  });
})();
</script>
</body>
</html>
